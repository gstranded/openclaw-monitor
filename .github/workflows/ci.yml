name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - claw/**

permissions:
  contents: read

jobs:
  backend:
    name: backend (check + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Static check
        run: npm run check

      - name: Unit tests
        run: npm test

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('web/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build
        working-directory: web
        run: npm run build
