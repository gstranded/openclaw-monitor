name: markdown-boundaries

on:
  pull_request:
  push:
    branches:
      - main
      - claw/**

jobs:
  boundary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate markdown boundary policy
        run: python3 scripts/check_markdown_boundaries.py --verify-artifact-layout
